path: icu/ingredientevents.csv.gz

columns:
  # subject_id and extensions
  - name: subject_id
    type: int64
  - name: hadm_id
    type: int64
  - name: stay_id
    type: int64
  - name: caregiver_id
    type: int64
  - name: orderid
    type: int64
  - name: linkorderid
    type: int64
    # db fields - times
  - name: starttime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  - name: endtime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  - name: storetime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
    # db fields - values
  - name: itemid
    type: int64
  - name: amount
    type: float32
  - name: amountuom
    type: string
  - name: rate
    type: float32
  - name: rateuom
    type: string
  - name: statusdescription
    type: string
  - name: originalamount
    type: float32
  - name: originalrate
    type: float32

join:
  - name: d_items
    path: icu/d_items.csv.gz
    columns:
      # subject_id and extensions
      # db fields - times
      # db fields - values
      - name: itemid
        type: int64
      - name: label
        type: string
    both_on:
      - itemid

event_defaults:
  subject_id: col(subject_id)
  extension:
    hadm_id: col(hadm_id)
    stay_id: col(stay_id)
    caregiver_id: col(caregiver_id)
    orderid: col(orderid)
    linkorderid: col(linkorderid)

events:
  - name: INGREDIENT_START
    columns:
      time: col(starttime)
      code:
        - col(itemid)
        - col(label)
    extension:
      originalamount: col(originalamount)
      amountuom: col(amountuom)
      originalrate: col(originalrate)
      rateuom: col(rateuom)

  - name: INGREDIENT_END
    columns:
      time: col(endtime)
      code:
        - col(itemid)
        - col(label)
      text_value: col(statusdescription)
    extension:
      rate: col(rate)
      rateuom: col(rateuom)
      amount: col(amount)
      amountuom: col(amountuom)
  # TODO: consider bolus administration, which do not have a rate and have endtime: starttime + 1 minute
