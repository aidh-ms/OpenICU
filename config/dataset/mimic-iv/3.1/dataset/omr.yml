path: hosp/omr.csv.gz

columns:
  # subject_id and extentions
  - name: subject_id
    type: int64
  # db fields - times
  - name: chartdate
    type: datetime
    params:
      format: "%Y-%m-%d"
  # db fields - values
  - name: seq_num
    type: int64
  - name: result_name
    type: string
  - name: result_value
    type: string

event_defaults:
  subject_id: col(subject_id)

events:
  - name: MISC
    columns:
      # TODO: move chartdate to end of day with callback
      time: col(chartdate)
      available_time: col(chartdate)
      code:
        - col(result_name)
      text_value: col(result_value)
    extension:
      seq_num: col(seq_num)
