path: hosp/procedures_icd.csv.gz

columns:
  # subject_id and extentions
  - name: subject_id
    type: int64
  - name: hadm_id
    type: int64
  # db fields - times
  - name: chartdate
    type: datetime
    params:
      format: "%Y-%m-%d"
  # db fields - values
  - name: seq_num
    type: int64
  - name: icd_code
    type: string
  - name: icd_version
    type: int64


join:
  - name: d_icd_procedures
    path: hosp/d_icd_procedures.csv.gz
    columns:
      # subject_id and extentions
      # db fields - times
      # db fields - values
      - name: icd_code
        type: string
      - name: icd_version
        type: int64
      - name: long_title
        type: string
    both_on:
      - icd_code
      - icd_version
  - name: admissions
    path: hosp/admissions.csv.gz
    columns:
      # subject_id and extentions
      - name: hadm_id
        type: int64
      # db fields - times
      - name: dischtime
        type: datetime
        params:
          format: "%Y-%m-%d %H:%M:%S"
      # db fields - values
    both_on:
      - hadm_id

event_defaults:
  subject_id: col(subject_id)
  extension:
    hadm_id: col(hadm_id)

events:
  - name: PROCEDURE
    columns:
      # TODO: move to end of the day with callback
      time: col(chartdate)
      code:
        - const("ICD")
        - col(icd_version)
        - col(icd_code)
        - col(long_title)
      extension:
        available_time: col(dischtime)
        seq_num: col(seq_num)
