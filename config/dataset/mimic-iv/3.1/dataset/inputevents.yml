path: icu/inputevents.csv.gz

columns:
  # subject_id and extentions
  - name: hadm_id
    type: int64
  - name: stay_id
    type: int64
  - name: subject_id
    type: int64
  # db fields - times
  - name: endtime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  - name: starttime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  # db fields - values
  - name: amount
    type: float32
  - name: amountuom
    type: string
  - name: itemid
    type: int64
  - name: rate
    type: float32
  - name: rateuom
    type: string

join:
  - name: d_items
    path: icu/d_items.csv.gz
    columns:
      # subject_id and extentions
      # db fields - times
      # db fields - values
      - name: itemid
        type: int64
      - name: label
        type: string
    both_on:
      - itemid

event_defaults:
  subject_id: col(subject_id)
  extension:
    hadm_id: col(hadm_id)
    stay_id: col(stay_id)
    caregiver_id: col(caregiver_id)
    orderid: col(orderid)
    linkorderid: col(linkorderid)

events:
  - name: INFUSION_START
    columns:
      time: col(starttime)
      code:
        - col(itemid)
        - col(label)
    extension:
      - col(originalamount)
      - col(amountuom)
      - col(originalrate)
      - col(rateuom)
      - col(totalamount)
      - col(totalamountuom)

  - name: INFUSION_END
    columns:
      time: col(endtime)
      code:
        - col(itemid)
        - col(label)
      text_value: col(statusdescription)
    extension:
      - col(rate)
      - col(rateuom)
      - col(amount)
      - col(amountuom)

  - name: SUBJECT_WEIGHT_AT_INFUSION
    columns:
      time: col(starttime)
      code:
        - const(kg)
      numeric_value:
        - col(patientweight)
