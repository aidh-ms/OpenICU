path: hosp/labevents.csv.gz

columns:
  # subject_id and extentions
  - name: subject_id
    type: int64
  - name: hadm_id
    type: int64
  - name: labevent_id
    type: int64
  - name: specimen_id
    type: int64
  - name: order_provider_id
    type: string
  # db fields - times
  - name: charttime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  - name: storetime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  # db fields - values
  - name: itemid
    type: int64
  - name: value
    type: string
  - name: valuenum
    type: float32
  - name: valueuom
    type: string
  - name: ref_range_lower
    type: float32
  - name: ref_range_upper
    type: float32
  - name: flag
    type: string
  - name: priority
    type: string
  - name: comments
    type: string

join:
  - name: d_labitems
    path: hosp/d_labitems.csv.gz
    columns:
      # subject_id and extentions
      # db fields - times
      # db fields - values
      - name: category
        type: string
      - name: itemid
        type: int64
      - name: label
        type: string
      - name: fluid
        type: string
    both_on:
      - itemid

event_defaults:
  subject_id: col(subject_id)
  extension:
    hadm_id: col(hadm_id)
    labevent_id: col(labevent_id)
    specimen_id: col(specimen_id)
    order_provider_id: col(order_provider_id)

events:
  - name: LAB
    columns:
      time: col(charttime)
      code:
        - col(itemid)
        - col(label)
        - col(valueuom)
      numeric_value: col(valuenum)
      text_value: col(value)
    extension:
      ref_range_lower: col(ref_range_lower)
      ref_range_upper: col(ref_range_upper)
      flag: col(flag)
      priority: col(priority)
      comments: col(comments)
