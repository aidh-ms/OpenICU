path: hosp/patients.csv.gz

columns:
  # subject_id and extentions
  - name: subject_id
    type: int64
  # db fields - times
  - name: anchor_age
    type: int64
  - name: anchor_year
    type: int64
  - name: anchor_year_group
    type: string
  - name: dod
    type: datetime
    params:
      format: "%Y-%m-%d"
  # db fields - values
  - name: gender
    type: string

post_callbacks:
  - to_datetime(anchor_year, 1, 1, "00:00:00", anchor_age, dob)

event_defaults:
  subject_id: col(subject_id)

events:
  - name: MEDS_BIRTH
    columns:
      time: col(dob)

  - name: GENDER
    columns:
      time: col(dob)
      code:
        - col(gender)

  - name: MEDS_DEATH
    columns:
      time: col(dod)
    filters:
      - drop_na(time)
  # TODO: move to end of day or deduplicate with in-hospital death
