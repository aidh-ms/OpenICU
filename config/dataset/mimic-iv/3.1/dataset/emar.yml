path: hosp/emar.csv.gz

columns:
  # subject_id and extentions
  - name: subject_id
    type: int64
  - name: hadm_id
    type: int64
  - name: emar_id  # emar = subject_id + "-" + emar_seq
    type: string
  - name: emar_seq
    type: int64
  - name: pharmacy_id
    type: int64
  - name: poe_id
    type: string
  - name: enter_provider_id
    type: string
  # db fields - times
  - name: charttime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  - name: storetime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  - name: scheduletime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  # db fields - values
  - name: event_txt
    type: string
  - name: medication
    type: string

event_defaults:
  subject_id: col(subject_id)
  extension:
    hadm_id: col(hadm_id)
    emar_id: col(emar_id)
    emar_seq: col(emar_seq)
    poe_id: col(poe_id)
    pharmacy_id: col(pharmacy_id)
    enter_provider_id: col(enter_provider_id)

events:
  - name: MEDICATION_ADMINISTRATION
    columns:
      time: col(charttime)
      available_time: col(storetime)
      code:
        - col(event_txt)
        - col(medication)
      extension:
        scheduletime: col(scheduletime)
