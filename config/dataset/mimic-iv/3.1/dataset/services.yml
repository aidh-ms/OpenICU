path: hosp/services.csv.gz

columns:
  # subject_id and extentions
  - name: subject_id
    type: int64
  - name: hadm_id
    type: int64
  # db fields - times
  - name: transfertime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  # db fields - values
  - name: prev_service
    type: string
  - name: curr_service
    type: string

event_defaults:
  subject_id: col(subject_id)
  extension:
    hadm_id: col(hadm_id)

events:
  - name: SERVICE
    time: col(transfertime)
    columns:
      code:
        - col(curr_service)
      extension:
        available_time: col(transfertime)
