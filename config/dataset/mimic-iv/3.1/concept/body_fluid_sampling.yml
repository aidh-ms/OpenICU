type: simple
mappings:
  - pattern:
      table: microbiologyevents
      event: MICROBIOLOGY_SPECIMEN
      code: org_itemid
    columns: &id001
      numeric_value: col(numeric_value)
      text_value: col(text_value)
  - pattern:
      table: microbiologyevents
      event: MICROBIOLOGY_TEST
      code: org_itemid
    columns: *id001
  - pattern:
      table: microbiologyevents
      event: MICROBIOLOGY_ORGANISM
      code: org_itemid
    columns: *id001
  - pattern:
      table: microbiologyevents
      event: MICROBIOLOGY_SUSCEPTIBILITY
      code: org_itemid
    columns: *id001
