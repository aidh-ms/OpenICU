type: simple
mappings:
  - pattern:
      table: respiratorycare
      event: VENTILATION_START
      code: ventstartoffset
    columns: &id001
      numeric_value: col(ventstartoffset)
      text_value: col(ventstartoffset)
  - pattern:
      table: respiratorycare
      event: VENTILATION_END
      code: ventstartoffset
    columns: *id001
  - pattern:
      table: respiratorycare
      event: VENTILATION_START
      code: priorventstartoffset
    columns: &id002
      numeric_value: col(priorventstartoffset)
      text_value: col(priorventstartoffset)
  - pattern:
      table: respiratorycare
      event: VENTILATION_END
      code: priorventstartoffset
    columns: *id002
  - pattern:
      table: respiratorycharting
      event: RESPIRATORY_CHART
      code: (Start(//.*)?|Continued(//.*)?|respFlowPtVentData(//.*)?)
    columns:
      numeric_value: const(1)
      text_value: const("true")
