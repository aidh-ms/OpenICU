path: carePlanGoal.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: cplgoaloffset
    type: int64
  # db fields - values
  - name: cplgoalcategory
    type: string
  - name: cplgoalvalue
    type: string
  - name: cplgoalstatus
    type: string

post_callbacks:
  - add_offset(admission_timestamp, cplgoaloffset, event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    hadm_id: const(None)
    stay_id: col(patientunitstayid)

events:
  - name: careplangoal
    columns:
      code:
        - col(cplgoalcategory)
        - col(cplgoalstatus)
      text_value: col(cplgoalvalue)
    filters:
      - drop_na(cplgoalcategory)
