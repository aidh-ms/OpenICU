path: respiratoryCharting.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  - name: respchartid
    type: int64
  # db fields - times
  - name: respchartoffset
    type: int64
  - name: respchartentryoffset
    type: int64
  # db fields - values
  - name: respcharttypecat
    type: string
  - name: respchartvaluelabel
    type: string
  - name: respchartvalue
    type: string

post_callbacks:
  - add_offset(admission_timestamp, respchartoffset, output=event_timestamp)
  - add_offset(admission_timestamp, respchartentryoffset, output=entered_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    stay_id: col(patientunitstayid)
    respchart_id: col(respchartid)

events:
  - name: RESPIRATORY_CHART
    columns:
      code:
        - col(respcharttypecat)
        - col(respchartvaluelabel)
      # TODO: make sure this casts as a number, setting to null if it doesn't
      numeric_value: col(respchartvalue)
      text_value: col(respchartvalue)
      extension:
        available_time: col(enter_timestamp)
