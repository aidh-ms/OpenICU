      numeric_value: col(sodium)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_HEART_RATE
    columns:
      numeric_value: col(heartrate)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_MEAN_BP
    columns:
