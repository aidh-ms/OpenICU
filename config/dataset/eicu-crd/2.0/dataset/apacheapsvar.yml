path: apacheApsVar.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - binary flags
  - name: intubated
    type: int64
  - name: vent
    type: int64
  - name: dialysis
    type: int64
  # GCS components
  - name: eyes
    type: int64
  - name: motor
    type: int64
  - name: verbal
    type: int64
  # lab/vital values
  - name: urine
    type: float64
  - name: wbc
    type: float64
  - name: temperature
    type: float64
  - name: respiratoryrate
    type: float64
  - name: sodium
    type: int64
  - name: heartrate
    type: int64
  - name: meanbp
    type: int64
  - name: ph
    type: float64
  - name: hematocrit
    type: float64
  - name: creatinine
    type: float64
  - name: albumin
    type: float64
  - name: pao2
    type: float64
  - name: pco2
    type: float64
  - name: bun
    type: int64
  - name: glucose
    type: int64
  - name: bilirubin
    type: float64
  - name: fio2
    type: float64

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(admission_timestamp)
  extension:
    hadm_id: const(-1)
    stay_id: col(patientunitstayid)

events:
  - name: intubated
    columns:
      numeric_value: col(intubated)
  - name: vent
    columns:
      numeric_value: col(vent)
  - name: dialysis
    columns:
      numeric_value: col(dialysis)
  - name: gcs_eyes
    columns:
      code:
        - const("GCS")
      numeric_value: col(eyes)
    filters:
      - drop_na(numeric_value)
  - name: gcs_motor
    columns:
      code:
        - const("GCS")
      numeric_value: col(motor)
    filters:
      - drop_na(numeric_value)
  - name: gcs_verbal
    columns:
      code:
        - const("GCS")
      numeric_value: col(verbal)
    filters:
      - drop_na(numeric_value)
  - name: urine
    columns:
      code:
        - const("mL")
      numeric_value: col(urine)
    filters:
      - drop_na(numeric_value)
  - name: wbc
    columns:
      numeric_value: col(wbc)
    filters:
      - drop_na(numeric_value)
  - name: temperature
    columns:
      numeric_value: col(temperature)
    filters:
      - drop_na(numeric_value)
  - name: respiratoryrate
    columns:
      numeric_value: col(respiratoryrate)
    filters:
      - drop_na(numeric_value)
  - name: sodium
    columns:
      numeric_value: col(sodium)
    filters:
      - drop_na(numeric_value)
  - name: heartrate
    columns:
      numeric_value: col(heartrate)
    filters:
      - drop_na(numeric_value)
  - name: meanbp
    columns:
      numeric_value: col(meanbp)
    filters:
      - drop_na(numeric_value)
  - name: ph
    columns:
      numeric_value: col(ph)
    filters:
      - drop_na(numeric_value)
  - name: hematocrit
    columns:
      numeric_value: col(hematocrit)
    filters:
      - drop_na(numeric_value)
  - name: creatinine
    columns:
      numeric_value: col(creatinine)
    filters:
      - drop_na(numeric_value)
  - name: albumin
    columns:
      numeric_value: col(albumin)
    filters:
      - drop_na(numeric_value)
  - name: pao2
    columns:
      numeric_value: col(pao2)
    filters:
      - drop_na(numeric_value)
  - name: pco2
    columns:
      numeric_value: col(pco2)
    filters:
      - drop_na(numeric_value)
  - name: bun
    columns:
      numeric_value: col(bun)
    filters:
      - drop_na(numeric_value)
  - name: glucose
    columns:
      numeric_value: col(glucose)
    filters:
      - drop_na(numeric_value)
  - name: bilirubin
    columns:
      numeric_value: col(bilirubin)
    filters:
      - drop_na(numeric_value)
  - name: fio2
    columns:
      numeric_value: col(fio2)
    filters:
      - drop_na(numeric_value)
