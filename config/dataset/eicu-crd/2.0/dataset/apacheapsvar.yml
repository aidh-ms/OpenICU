    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_PH
    columns:
      numeric_value: col(ph)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_HEMATOCRIT
    columns:
      numeric_value: col(hematocrit)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_CREATININE
    columns:
      numeric_value: col(creatinine)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_ALBUMIN
    columns:
      numeric_value: col(albumin)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_PAO2
    columns:
      numeric_value: col(pao2)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_PCO2
    columns:
      numeric_value: col(pco2)
    filters:
      - drop_na(numeric_value)
  - name: APACHE_APS_BUN
    columns:
