path: admissionDx.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: admitdxenteredoffset
    type: int64
  # db fields - values
  - name: admitdxpath
    type: string
  - name: admitdxname
    type: string
  - name: admitdxtext
    type: string

post_callbacks:
  - add_offset(admission_timestamp, admitdxenteredoffset, event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    hadm_id: const(-1)
    stay_id: col(patientunitstayid)

events:
  - name: admissiondx
    columns:
      code:
        - col(admitdxname)
      text_value: col(admitdxtext)
    filters:
      - drop_na(admitdxname)
