path: allergy.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: allergyoffset
    type: int64
  # db fields - values
  - name: allergytype
    type: string
  - name: allergyname
    type: string
  - name: drugname
    type: string

post_callbacks:
  - add_offset(admission_timestamp, allergyoffset, event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    hadm_id: const(-1)
    stay_id: col(patientunitstayid)

events:
  - name: allergy
    columns:
      code:
        - col(allergytype)
      text_value: col(allergyname)
    filters:
      - drop_na(allergyname)
  - name: drugallergy
    columns:
      code:
        - col(allergytype)
      text_value: col(drugname)
    filters:
      - drop_na(drugname)
