path: admissionDrug.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: drugoffset
    type: int64
  # db fields - values
  - name: drugname
    type: string
  - name: drugdosage
    type: string
  - name: drugunit
    type: string
  - name: drugadmitfrequency
    type: string

post_callbacks:
  - add_offset(admission_timestamp, drugoffset, event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    hadm_id: const(-1)
    stay_id: col(patientunitstayid)

events:
  - name: admissiondrug
    columns:
      code:
        - col(drugname)
        - col(drugunit)
      text_value: col(drugdosage)
    filters:
      - drop_na(drugname)
