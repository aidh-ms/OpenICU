path: diagnosis.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: diagnosisoffset
    type: int64
  # db fields - values
  - name: diagnosisstring
    type: string
  - name: icd9code
    type: string
  - name: diagnosispriority
    type: string

post_callbacks:
  - add_offset(admission_timestamp, diagnosisoffset, event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    hadm_id: const(None)
    stay_id: col(patientunitstayid)

events:
  - name: diagnosis
    columns:
      code:
        - col(icd9code)
        - col(diagnosispriority)
      text_value: col(diagnosisstring)
    filters:
      - drop_na(diagnosisstring)
