path: vitalPeriodic.csv.gz

columns:
  # subject_id and extentions
  - name: patientunitstayid
    type: int64
  - name: vitalperiodicid
    type: int64
  # db fields - times
  - name: observationoffset
    type: int64
  # db fields - values
  - name: cvp
    type: int64
  - name: etco2 # etCo2
    type: int64
  - name: heartrate
    type: float32 # decimal(x,y)
  - name: padiastolic
    type: int64
  - name: pamean
    type: int64
  - name: pasystolic
    type: int64
  - name: respiration
    type: int64
  - name: sao2  # saO2
    type: int64
  - name: st1
    type: float32
  - name: st2
    type: float32
  - name: st3
    type: float32
  - name: icp
    type: int64
  - name: systemicdiastolic
    type: int64
  - name: systemicmean
    type: int64
  - name: systemicsystolic
    type: int64
  - name: temperature
    type: float32 # decimal(x,y)
  - name: vitalperiodicid
    type: int64


post_callbacks:
  - add_offset(admission_timestamp, observationoffset, output=event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      # subject_id and extentions
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      # db fields - times
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
      # db fields - values
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    stay_id: col(patientunitstayid)
    vitalperiodicid: col(vitalperiodicid)
    available_time: col(event_timestamp)

events:
  # TODO: can we preface all of these with VITAL//
  - name: HEART_RATE
    columns:
      code:
        - const(BPM)
      numeric_value: col(heartrate)
    filters:
      # TODO: filter on original name or on `numeric_value`?
      - drop_na(heartrate)
  - name: TEMPERATURE
    columns:
      code:
        - const(C)
      numeric_value: col(temperature)
    filters:
      - drop_na(temperature)
  - name: O2_SATURATION_PULSE_OXIMETRY
    columns:
      code:
        - const(%)
      numeric_value: col(sao2)
    filters:
      - drop_na(sao2)
  - name: RESPIRATORY_RATE
    columns:
      code:
        - const(bpm)
      numeric_value: col(respiration)
    filters:
      - drop_na(respiration)
  - name: CENTRAL_VENOUS_PRESSURE
    columns:
      code:
      # TODO: some patients have cvp > 200, which may be mmH20 rather than mmHg.
        - const(mmHg)
      numeric_value: col(cvp)
    filters:
      - drop_na(cvp)
  - name: ETCO2
    columns:
      code:
        - const(mmHg)
      numeric_value: col(etco2)
    filters:
      - drop_na(etco2)
  - name: SYSTOLIC_BLOOD_PRESSURE
    columns:
      code:
        - const(mmHg)
      numeric_value: col(systemicsystolic)
    filters:
      - drop_na(systemicsystolic)
  - name: DIASTOLIC_BLOOD_PRESSURE
    columns:
      code:
        - const(mmHg)
      numeric_value: col(systemicdiastolic)
    filters:
      - drop_na(systemicdiastolic)
  - name: MEAN_INVASIVE_BLOOD_PRESSURE
    columns:
      code:
        - const(mmHg)
      numeric_value: col(systemicmean)
    filters:
      - drop_na(systemicmean)
  - name: PULMONARY_ARTERY_SYSTOLIC_BLOOD_PRESSURE
    columns:
      code:
        - const(mmHg)
      numeric_value: col(pasystolic)
    filters:
      - drop_na(pasystolic)
  - name: PULMONARY_ARTERY_DIASTOLIC_BLOOD_PRESSURE
    columns:
      code:
        - const(mmHg)
      numeric_value: col(padiastolic)
    filters:
      - drop_na(padiastolic)
  - name: PULMONARY_ARTERY_MEAN_BLOOD_PRESSURE
    columns:
      code:
        - const(mmHg)
      numeric_value: col(pamean)
    filters:
      - drop_na(pamean)
  - name: ST_SEGMENT_DEVIATION_LEAD_1
    columns:
      code:
        - const(mV)
      numeric_value: col(st1)
    filters:
      - drop_na(st1)
  - name: ST_SEGMENT_DEVIATION_LEAD_2
    columns:
      code:
        - const(mV)
      numeric_value: col(st2)
    filters:
      - drop_na(st2)
  - name: ST_SEGMENT_DEVIATION_LEAD_3
    columns:
      code:
        - const(mV)
      numeric_value: col(st3)
    filters:
      - drop_na(st3)
  - name: INTRACRANIAL_PRESSURE
    columns:
      code:
        - const(mmHg)
      numeric_value: col(icp)
    filters:
      - drop_na(icp)
