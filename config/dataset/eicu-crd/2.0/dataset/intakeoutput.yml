path: intakeOutput.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: intakeoutputoffset
    type: int64
  # db fields - values
  - name: intaketotal
    type: float64
  - name: outputtotal
    type: float64
  - name: dialysistotal
    type: float64
  - name: nettotal
    type: float64
  - name: celllabel
    type: string
  - name: cellvaluenumeric
    type: float64
  - name: cellvaluetext
    type: string

post_callbacks:
  - add_offset(admission_timestamp, intakeoutputoffset, event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    hadm_id: const(-1)
    stay_id: col(patientunitstayid)

events:
  - name: intaketotal
    columns:
      code:
        - const("mL")
      numeric_value: col(intaketotal)
  - name: outputtotal
    columns:
      code:
        - const("mL")
      numeric_value: col(outputtotal)
  - name: dialysistotal
    columns:
      code:
        - const("mL")
      numeric_value: col(dialysistotal)
  - name: nettotal
    columns:
      code:
        - const("mL")
      numeric_value: col(nettotal)
  - name: cellevent
    columns:
      code:
        - col(celllabel)
      numeric_value: col(cellvaluenumeric)
      text_value: col(cellvaluetext)
    filters:
      - drop_na(celllabel)
