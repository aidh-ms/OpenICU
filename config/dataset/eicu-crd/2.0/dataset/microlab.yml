path: microLab.csv.gz

columns:
  # subject_id and extensions
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: culturetakenoffset
    type: int64
  # db fields - values
  - name: culturesite
    type: string
  - name: organism
    type: string
  - name: antibiotic
    type: string
  - name: sensitivitylevel
    type: string

post_callbacks:
  - add_offset(admission_timestamp, culturetakenoffset, event_timestamp)

join:
  - name: patient
    path: patient.csv.gz
    columns:
      - name: patienthealthsystemstayid
        type: int64
      - name: patientunitstayid
        type: int64
      - name: hospitaladmitoffset
        type: int64
      - name: hospitaladmittime24
        type: string
      - name: hospitaldischargeyear
        type: int64
    both_on:
      - patientunitstayid
    callbacks:
      - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, hospitaladmitoffset, "minutes", output=admission_timestamp)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  time: col(event_timestamp)
  extension:
    hadm_id: const(-1)
    stay_id: col(patientunitstayid)

events:
  - name: culture
    columns:
      code:
        - col(culturesite)
        - col(organism)
      text_value: col(sensitivitylevel)
    filters:
      - drop_na(culturesite)
  - name: sensitivity
    columns:
      code:
        - col(culturesite)
        - col(organism)
        - col(antibiotic)
      text_value: col(sensitivitylevel)
    filters:
      - drop_na(antibiotic)
