# HiRID v1.1.1 -- observations variableid(s) 20004300 [ricu bili]; converts to the concept unit (* 0.058467)
type: simple
mappings:
  - pattern:
      table: observations
      event: OBSERVATION
      code: "(20004300)(//.*)?$"
    columns:
      numeric_value: col(numeric_value) * 0.058467
      text_value: col(text_value)
