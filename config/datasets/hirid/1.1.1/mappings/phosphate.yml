# HiRID v1.1.1 -- observations variableid(s) 20002500 [ricu phos]; converts to the concept unit (* 3.097521)
type: simple
mappings:
  - pattern:
      table: observations
      event: OBSERVATION
      code: "(20002500)(//.*)?$"
    columns:
      numeric_value: col(numeric_value) * 3.097521
      text_value: col(text_value)
