# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3014576 = Chloride [Moles/volume] in Serum or Plasma
#   3018572 = Chloride [Moles/volume] in Blood
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3014576|3018572)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
