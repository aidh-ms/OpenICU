# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3009094 = Glasgow coma score verbal
#   3013144 = Glasgow coma score verbal at First encounter
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3009094|3013144)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
