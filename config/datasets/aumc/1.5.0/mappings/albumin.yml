# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3024561 = Albumin [Mass/volume] in Serum or Plasma
#   3028286 = Albumin [Mass/volume] in Serum or Plasma by Electrophoresis
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3024561|3028286)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
