# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3035357 = Carbon dioxide [Partial pressure] in Exhaled gas --at end expiration
#   3017485 = Carbon dioxide/Gas.total.at end expiration in Exhaled gas
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3035357|3017485)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
