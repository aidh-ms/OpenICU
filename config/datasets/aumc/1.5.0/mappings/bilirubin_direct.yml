# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3043744 = Bilirubin.conjugated+indirect [Mass/volume] in Serum or Plasma
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "3043744(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
