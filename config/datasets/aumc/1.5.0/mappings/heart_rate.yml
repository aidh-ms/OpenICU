# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3027018 = Heart rate
#   21490872 = Heart rate.beat-to-beat by EKG
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3027018|21490872)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
