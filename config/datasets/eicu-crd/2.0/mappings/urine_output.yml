type: simple
mappings:
  - pattern:
      table: intakeoutput
      event: INTAKE_OUTPUT
      code: (Urine(//.*)?|URINE\ CATHETER(//.*)?)
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
  - pattern:
      table: intakeoutput
      event: INTAKE_OUTPUT
      code: (catheter.+output|output.+catheter)
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
