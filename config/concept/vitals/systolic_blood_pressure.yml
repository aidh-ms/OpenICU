name: systolic_blood_pressure
version: 1.0.0
unit: ['mmHg', 'mm Hg']

extension_columns:
  dataset: col("dataset")
  table: col("table")

mappings:
  - pattern:
      dataset: mimic-iv
      version: "3.1"
      table: chartevents
      event: result
      code: (220050//Arterial Blood Pressure systolic|220179//Non Invasive Blood Pressure systolic)
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
