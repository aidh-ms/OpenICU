path: data/nw_icu/icustays.csv.gz

columns:
  # subject_id and extensions
  - name: subject_id
    type: int64
  - name: hadm_id
    type: int64
  - name: stay_id
    type: int64

  # db fields - times
  - name: intime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"
  - name: outtime
    type: datetime
    params:
      format: "%Y-%m-%d %H:%M:%S"

  # db fields - values
  - name: first_careunit
    type: string
  - name: last_careunit
    type: string
  - name: los
    type: float32

event_defaults:
  subject_id: col(subject_id)
  extension:
    hadm_id: col(hadm_id)
    stay_id: col(stay_id)

events:
  - name: icu_admission
    columns:
      time: col(intime)
      code:
        - const("ICU_ADMISSION")
      extension:
        available_time: col(intime)
        careunit: col(first_careunit)

  - name: icu_discharge
    columns:
      time: col(outtime)
      code:
        - const("ICU_DISCHARGE")
      extension:
        available_time: col(outtime)
        careunit: col(last_careunit)
    filters:
      - drop_na(time)

  - name: icu_length_of_stay
    columns:
      time: col(outtime)
      code:
        - const("days")
      numeric_value: col(los)
      extension:
        available_time: col(outtime)
    filters:
      - drop_na(time)
