# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3032080 = INR in Blood by Coagulation assay
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "3032080(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
