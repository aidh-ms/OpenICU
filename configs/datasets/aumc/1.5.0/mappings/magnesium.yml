# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3012095 = Magnesium [Moles/volume] in Serum or Plasma
#   3033836 = Magnesium [Moles/volume] in Blood
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3012095|3033836)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
