# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3019800 = Troponin T.cardiac [Mass/volume] in Serum or Plasma
#   3048529 = Troponin T.cardiac [Mass/volume] in Blood
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3019800|3048529)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
