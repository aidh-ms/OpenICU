# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3004410 = Hemoglobin A1c/Hemoglobin.total in Blood
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "3004410(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
