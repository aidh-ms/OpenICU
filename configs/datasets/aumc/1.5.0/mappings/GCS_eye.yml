# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3016335 = Glasgow coma score eye opening
#   3026019 = Glasgow coma score eye opening at First encounter
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3016335|3026019)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
