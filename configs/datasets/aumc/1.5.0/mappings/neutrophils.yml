# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3018010 = Neutrophils/100 leukocytes in Blood
#   3008342 = Neutrophils/100 leukocytes in Blood by Automated count
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3018010|3008342)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
