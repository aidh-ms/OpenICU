# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   40762499 = Oxygen saturation in Arterial blood by Pulse oximetry
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "40762499(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
