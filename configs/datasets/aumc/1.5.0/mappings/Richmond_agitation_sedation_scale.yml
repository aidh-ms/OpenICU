# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   36684829 = Richmond Agitation-Sedation Scale
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "36684829(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
