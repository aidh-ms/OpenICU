# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   42869588 = Hematocrit [Pure volume fraction] of Blood by Automated count
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "42869588(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
