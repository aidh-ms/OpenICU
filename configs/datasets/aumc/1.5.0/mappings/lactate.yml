# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3047181 = Lactate [Moles/volume] in Blood
#   3014111 = Lactate [Moles/volume] in Serum or Plasma
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3047181|3014111)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
