# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3013290 = Carbon dioxide [Partial pressure] in Blood
#   3027946 = Carbon dioxide [Partial pressure] in Arterial blood
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3013290|3027946)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
