# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3000285 = Sodium [Moles/volume] in Blood
#   3019550 = Sodium [Moles/volume] in Serum or Plasma
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3000285|3019550)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
