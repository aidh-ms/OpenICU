# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3012501 = Base excess in Blood by calculation
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "3012501(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
