# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3007220 = Creatine kinase [Enzymatic activity/volume] in Serum or Plasma
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "3007220(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
