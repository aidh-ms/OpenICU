# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3006140 = Bilirubin.total [Moles/volume] in Serum or Plasma
#   40757494 = Bilirubin.total [Moles/volume] in Blood
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3006140|40757494)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
