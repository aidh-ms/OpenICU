# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   40762351 = Hemoglobin [Moles/volume] in Blood
#   40758903 = Hemoglobin [Mass/volume] in Blood by Oximetry
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(40762351|40758903)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
