# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3004809 = Band form neutrophils/100 leukocytes in Blood
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "3004809(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
