# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3023599 = MCV [Entitic volume] by Automated count
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "3023599(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
