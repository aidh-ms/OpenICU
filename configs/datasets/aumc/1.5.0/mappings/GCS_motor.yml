# AUMCdb (OMOP CDM 5.4 via AMSTEL) -- maps OMOP measurement_concept_id:
#   3008223 = Glasgow coma score motor
#   3026549 = Glasgow coma score motor at First encounter
type: simple
mappings:
  - pattern:
      table: measurement
      event: MEASUREMENT
      code: "(3008223|3026549)(//.*)?$"
    columns:
      numeric_value: col(numeric_value)
      text_value: col(text_value)
