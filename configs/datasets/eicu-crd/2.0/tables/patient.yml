path: patient.csv.gz

columns:
  # subject_id and extension
  - name: patienthealthsystemstayid
    type: int64
  - name: patientunitstayid
    type: int64
  # db fields - times
  - name: hospitaladmitoffset
    type: int64
  - name: hospitaladmittime24
    type: string
  - name: hospitaldischargeoffset
    type: int64
  - name: hospitaldischargeyear
    type: int64
  - name: unitadmittime24
    type: string
  - name: unitdischargeoffset
    type: int64
  - name: unitdischargetime24
    type: string
  # db fields - values
  - name: admissionheight
    type: float32 # decimal(x,y) # decimal(10,2)
  - name: admissionweight
    type: float32 # decimal(x,y)
  - name: age
    type: string
  - name: apacheadmissiondx
    type: string
  - name: dischargeweight
    type: float32 # decimal(x,y)
  - name: ethnicity
    type: string
  - name: gender
    type: string
  - name: hospitaladmitsource
    type: string
  - name: hospitaldischargelocation
    type: string
  - name: hospitaldischargestatus
    type: string
  - name: hospitalid
    type: int64
  - name: unitadmitsource
    type: string
  - name: unitdischargelocation
    type: string
  - name: unitdischargestatus
    type: string
  - name: unitstaytype
    type: string
  - name: unitvisitnumber
    type: int64
  - name: unittype
    type: string
  - name: uniquepid
    type: string
  - name: wardid
    type: int64

post_join_callbacks:
  # eICU offsets are relative to ICU admission. hospitalAdmitOffset is normally
  # negative, so subtracting it moves forward from hospital to ICU admission.
  - to_datetime(hospitaldischargeyear, 1, 1, hospitaladmittime24, output=hospital_admission_timestamp)
  - add_offset(hospital_admission_timestamp, hospitaladmitoffset * -1, output=admission_timestamp)
  - add_offset(admission_timestamp, hospitaldischargeoffset, output=hospital_discharge_timestamp)
  - add_offset(admission_timestamp, unitdischargeoffset, output=discharge_timestamp)
  - add_offset(admission_timestamp, cast(replace(age == "> 89", "90", age), "int16") * 365.25, offset_unit="days", output=birth_timestamp)
  - replace((gender == "") or (gender == None), "Unknown", gender, output=gender_1)

event_defaults:
  subject_id: col(patienthealthsystemstayid)
  extension:
    stay_id: col(patientunitstayid)

events:
  - name: GENDER
    columns:
      time: col(birth_timestamp)
      code:
        - col(gender_1)

  - name: HOSPITAL_ADMISSION
    columns:
      time: col(hospital_admission_timestamp)
      code:
        - col(hospitaladmitsource)
      extension:
        available_time: col(hospital_admission_timestamp)
    filters:
      - drop_na(time)
      - first_distinct(subject_id, time)

  - name: ICU_ADMISSION
    columns:
      time: col(admission_timestamp)
      code:
        - col(unittype)
      extension:
        available_time: col(admission_timestamp)

  - name: MEDS_BIRTH
    columns:
      time: col(birth_timestamp)
    filters:
      - drop_na(time)
      - first_distinct(subject_id, time)

  - name: ETHNICITY
    columns:
      time: col(admission_timestamp)
      code:
        - col(ethnicity)
      extension:
        available_time: col(admission_timestamp)

  - name: SUBJECT_HEIGHT
    columns:
      time: col(admission_timestamp)
      code:
        - const(cm)
      numeric_value: col(admissionheight)
      extension:
        available_time: col(admission_timestamp)

  - name: SUBJECT_WEIGHT
    columns:
      time: col(admission_timestamp)
      code:
        - const(kg)
      numeric_value: col(admissionweight)
      extension:
        available_time: col(admission_timestamp)

  - name: ICU_DISCHARGE
    columns:
      time: col(discharge_timestamp)
      code:
        - col(unittype)
      extension:
        available_time: col(discharge_timestamp)

  - name: HOSPITAL_DISCHARGE
    columns:
      time: col(hospital_discharge_timestamp)
      code:
        - col(hospitaldischargelocation)
      text_value: col(hospitaldischargestatus)
      extension:
        available_time: col(hospital_discharge_timestamp)
    filters:
      - drop_na(time)
      - first_distinct(subject_id, time)

  - name: SUBJECT_WEIGHT
    columns:
      time: col(discharge_timestamp)
      code:
        - const(kg)
      numeric_value: col(dischargeweight)
      extension:
        available_time: col(discharge_timestamp)
