# HiRID v1.1.1 -- observations variableid(s) 20000600 [ricu crea]; converts to the concept unit (* 0.011312)
type: simple
mappings:
  - pattern:
      table: observations
      event: OBSERVATION
      code: "(20000600)(//.*)?$"
    columns:
      numeric_value: col(numeric_value) * 0.011312
      text_value: col(text_value)
