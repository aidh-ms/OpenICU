# HiRID v1.1.1 -- observations variableid(s) 24000230 [ricu mg]; converts to the concept unit (* 2.431)
type: simple
mappings:
  - pattern:
      table: observations
      event: OBSERVATION
      code: "(24000230)(//.*)?$"
    columns:
      numeric_value: col(numeric_value) * 2.431
      text_value: col(text_value)
