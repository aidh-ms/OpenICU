# HiRID v1.1.1 -- observations variableid(s) 24000548, 24000836, 20000900 [ricu hgb]; converts to the concept unit (* 0.1)
type: simple
mappings:
  - pattern:
      table: observations
      event: OBSERVATION
      code: "(24000548|24000836|20000900)(//.*)?$"
    columns:
      numeric_value: col(numeric_value) * 0.1
      text_value: col(text_value)
