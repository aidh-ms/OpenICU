# HiRID v1.1.1 -- observations variableid(s) 24000806 [ricu tnt]; converts to the concept unit (/ 1000)
type: simple
mappings:
  - pattern:
      table: observations
      event: OBSERVATION
      code: "(24000806)(//.*)?$"
    columns:
      numeric_value: col(numeric_value) / 1000
      text_value: col(text_value)
