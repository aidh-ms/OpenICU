# HiRID v1.1.1 -- observations variableid(s) 20005100 [ricu ca]; converts to the concept unit (* 4.008)
type: simple
mappings:
  - pattern:
      table: observations
      event: OBSERVATION
      code: "(20005100)(//.*)?$"
    columns:
      numeric_value: col(numeric_value) * 4.008
      text_value: col(text_value)
