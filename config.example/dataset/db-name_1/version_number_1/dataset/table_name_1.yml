# PSEUDO extraction table config
# This file demonstrates the full extraction pipeline structure.
# It is not tied to a real dataset.

path: pseudo_measurements.csv.gz

columns:
  # subject_id and extensions
  - name: patient_id
    type: int64
  - name: stay_id
    type: int64
  - name: row_id
    type: int64

  # db fields - times
  - name: offset_minutes
    type: int64

  # db fields - values
  - name: raw_value
    type: string
  - name: raw_unit
    type: string
  - name: raw_status
    type: string

# Table-level pre_callbacks
# Runs after reading the raw table and selecting configured columns,
# but before configured column parsing/casting.
# Use this for raw source cleanup.
pre_callbacks:
  - str_strip(raw_value, output=raw_value)

# Table-level pre_filters
# Runs after pre_callbacks, before configured column parsing/casting.
# Use this to remove obviously invalid rows early.
pre_filters:
  - drop_na(patient_id)

# Table-level callbacks
# Runs after configured column parsing/casting.
# Use this for derived columns that only depend on this table.
callbacks:
  - cast(raw_value, float32, strict=false, output=value)

# Table-level filters
# Runs after table-level callbacks.
# Use this to filter rows based on cleaned or derived table columns.
filters:
  - drop_na(value)

join:
  # Join-table level
  # This table is processed with the same local pipeline as the main table
  # before it is joined into the main table.
  - name: pseudo_patient
    path: pseudo_patient.csv.gz
    type: csvgz

    columns:
      # join keys and subject_id
      - name: patient_id
        type: int64
      - name: subject_id
        type: int64

      # db fields - times
      - name: admission_date
        type: string
      - name: admission_time
        type: string

    both_on:
      - patient_id

    # Join-table pre_callbacks
    # Runs before parsing/casting columns of the join table.
    pre_callbacks:
      - str_strip(admission_time, output=admission_time)

    # Join-table pre_filters
    # Removes invalid join-table rows before expensive processing.
    pre_filters:
      - drop_na(patient_id)

    # Join-table callbacks
    # Creates columns that only depend on the join table.
    callbacks:
      - to_datetime(admission_date, admission_time, output=admission_timestamp)

    # Join-table filters
    # Filters processed join-table rows before the join.
    filters:
      - drop_na(subject_id)

    # Join-specific post_join_callbacks
    # Runs immediately after this join.
    # Now columns from the main table and this join table are available.
    post_join_callbacks:
      - add_offset(admission_timestamp, offset_minutes, "minutes", output=event_time)

    # Join-specific post_join_filters
    # Filters rows immediately after this join.
    post_join_filters:
      - drop_na(event_time)

# Table-level post_join_callbacks
# Runs after all join tables have been joined.
# Use this for columns that may depend on multiple joined tables.
post_join_callbacks:
  - first_not_null(event_time, admission_timestamp, output=best_event_time)

# Table-level post_join_filters
# Runs after table post_join_callbacks.
# Use this to validate the fully enriched table before event extraction.
post_join_filters:
  - drop_na(best_event_time)

# Table-level transformations
# Runs after post_join filters.
# These are LazyFrame transformations, not simple column expressions.
# Use this for operations that change row structure, ordering, or uniqueness.
transformations:
  - unique(subject_id, best_event_time, row_id)

event_defaults:
  # Default MEDS column mappings
  # These are inherited by each event unless overridden in the event.
  subject_id: col(subject_id)
  time: col(best_event_time)

  # Default MEDS code construction
  # The automatic code prefix is added by Python:
  # db_name // table_name
  #
  # Configured code_prefix is inserted after db_name/table_name
  # and before the event name.
  #
  # Final code structure:
  # db_name // table_name // code_prefix // event.name // columns.code // code_suffix
  code_prefix:
    - const(PSEUDO_ICU)

  code_suffix:
    - const(DEFAULT_CODE_SUFFIX)

  # Default values
  numeric_value: null
  text_value: null

  # Default extension columns
  # These are inherited by each event unless overridden or extended.
  extension:
    source_dataset: const(pseudo_icu)
    source_table: const(pseudo_measurements)
    source_row_id: col(row_id)
    source_stay_id: col(stay_id)
    available_time: col(best_event_time)

events:
  # Event-level pipeline
  # Each event starts from the fully prepared table and creates one MEDS event output.

  - name: PSEUDO_NUMERIC_EVENT

    # Event-specific code construction
    # Overrides event_defaults.code_prefix and event_defaults.code_suffix.
    code_prefix:
      - const(NUMERIC)

    code_suffix:
      - const(VALUE)

    # Event-level pre_callbacks
    # Runs before MEDS column mapping.
    # Use this for event-specific preparation based on source/table columns.
    pre_callbacks:
      - cast(value, float32, strict=false, output=value_clean)

    columns:
      # MEDS code source
      # These code parts are inserted after event.name and before code_suffix.
      code:
        - const(MEASUREMENT_VALUE)

      # MEDS value columns
      numeric_value: col(value_clean)
      text_value: col(raw_unit)

      # Event-specific extension columns
      extension:
        source_column: const(raw_value)

    # Event-level callbacks
    # Runs after MEDS column mapping and code construction.
    # Use this to modify MEDS columns such as numeric_value, text_value, or code.
    callbacks:
      - cast(numeric_value, float32, strict=false, output=numeric_value)

    # Event-level filters
    # Runs after event callbacks.
    # Use this to remove invalid event rows.
    filters:
      - drop_na(numeric_value)

    # Event-level transformations
    # Runs after event filters.
    # These are LazyFrame transformations for this event only.
    transformations:
      - unique(subject_id, time, code)

    # Event-level output_filters
    # Runs after selecting the final MEDS output columns.
    # Use this for final schema-level validation.
    output_filters:
      - drop_na(subject_id)
      - drop_na(time)
      - drop_na(code)

  - name: PSEUDO_TEXT_EVENT

    # Event-specific code construction
    # Overrides event_defaults.code_prefix.
    # code_suffix is omitted, so the default suffix is used unless your merge
    # logic treats omission differently.
    code_prefix:
      - const(TEXT)

    pre_callbacks:
      - str_strip(raw_status, output=raw_status)

    columns:
      # MEDS code source
      # These code parts are inserted after event.name and before code_suffix.
      code:
        - const(STATUS)

      # MEDS value columns
      numeric_value: null
      text_value: col(raw_status)

      # Event-specific extension columns
      extension:
        source_column: const(raw_status)

    callbacks:
      - str_upper(text_value, output=text_value)

    filters:
      - drop_na(text_value)

    transformations:
      - unique(subject_id, time, code)

    output_filters:
      - drop_na(subject_id)
      - drop_na(time)
      - drop_na(code)